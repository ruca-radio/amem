# AMEM v2 Database Infrastructure
# Phase 2: PostgreSQL + Redis setup
#
# Usage:
#   docker-compose -f docker-compose.db.yml up -d          # Start services
#   docker-compose -f docker-compose.db.yml down           # Stop services
#   docker-compose -f docker-compose.db.yml logs -f        # View logs
#   docker-compose -f docker-compose.db.yml --profile tools up -d  # Include pgAdmin
#
# Environment Variables:
#   DB_PASSWORD      - PostgreSQL password (default: amem)
#   PGADMIN_PASSWORD - pgAdmin password (default: admin)

version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: amem-postgres
    environment:
      POSTGRES_USER: amem
      POSTGRES_PASSWORD: ${DB_PASSWORD:-amem}
      POSTGRES_DB: amem
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amem"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
    networks:
      - amem-network

  redis:
    image: redis:7-alpine
    container_name: amem-redis
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - amem-network

  # Optional: pgAdmin for database management
  # Start with: docker-compose -f docker-compose.db.yml --profile tools up -d
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amem-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@amem.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tools
    networks:
      - amem-network

  # Optional: Redis Insight for Redis management
  redisinsight:
    image: redis/redisinsight:latest
    container_name: amem-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tools
    networks:
      - amem-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  redisinsight_data:
    driver: local

networks:
  amem-network:
    name: amem-network
    driver: bridge
